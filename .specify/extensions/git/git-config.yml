# Git Branching Workflow Extension Configuration
# Copied to .specify/extensions/git/git-config.yml on install

# Branch numbering strategy: "sequential" (001, 002, ...) or "timestamp" (YYYYMMDD-HHMMSS)
branch_numbering: sequential

# Commit message used by `git commit` during repository initialization
init_commit_message: "chore: scaffold spec-kit project"

# Auto-commit before/after core commands.
# Set "default" to enable for all commands, then override per-command.
# Each key can be true/false. Message is customizable per-command.
#
# Messages follow Conventional Commits (https://www.conventionalcommits.org).
# The "{feature}" placeholder is replaced with the current feature slug
# (the branch name with its numbering prefix stripped, e.g. "project-scaffold"),
# so each commit names the feature it belongs to.
auto_commit:
  default: false
  before_clarify:
    enabled: false
    message: "chore(wip): save progress before clarifying {feature}"
  before_plan:
    enabled: false
    message: "chore(wip): save progress before planning {feature}"
  before_tasks:
    enabled: false
    message: "chore(wip): save progress before task breakdown for {feature}"
  before_implement:
    enabled: false
    message: "chore(wip): save progress before implementing {feature}"
  before_checklist:
    enabled: false
    message: "chore(wip): save progress before checklist for {feature}"
  before_analyze:
    enabled: false
    message: "chore(wip): save progress before analyzing {feature}"
  before_taskstoissues:
    enabled: false
    message: "chore(wip): save progress before syncing {feature} to issues"
  after_constitution:
    enabled: false
    message: "docs(constitution): establish project governing principles"
  after_specify:
    enabled: false
    message: "docs(spec): add feature specification for {feature}"
  after_clarify:
    enabled: false
    message: "docs(spec): resolve open questions for {feature}"
  after_plan:
    enabled: false
    message: "docs(plan): add implementation plan for {feature}"
  after_tasks:
    enabled: false
    message: "docs(tasks): break down implementation work for {feature}"
  after_implement:
    enabled: true
    message: "feat({feature}): implement planned tasks"
  after_checklist:
    enabled: false
    message: "docs(checklist): add review checklist for {feature}"
  after_analyze:
    enabled: false
    message: "docs(analysis): add cross-artifact consistency report for {feature}"
  after_taskstoissues:
    enabled: false
    message: "chore(tasks): sync {feature} tasks to GitHub issues"
