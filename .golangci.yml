version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
  exclusions:
    rules:
      # The conformance harness imports the Dapr suite and is build-tag gated.
      - path: tests/conformance/
        linters:
          - revive

formatters:
  enable:
    - gofmt
    - goimports
