# Local YDB instance for development and the conformance/integration test suite.
# Connection string (anonymous, plaintext): grpc://localhost:2136/local
services:
  ydb:
    image: ydbplatform/local-ydb:latest
    container_name: dapr-ydb-local
    hostname: localhost
    platform: linux/amd64
    ports:
      - "2135:2135"   # grpcs (TLS)
      - "2136:2136"   # grpc (plaintext)
      - "8765:8765"   # embedded UI / monitoring
    environment:
      YDB_USE_IN_MEMORY_PDISKS: "true"
      YDB_DEFAULT_LOG_LEVEL: "NOTICE"
      GRPC_TLS_PORT: "2135"
      GRPC_PORT: "2136"
      MON_PORT: "8765"
