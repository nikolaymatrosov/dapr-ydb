name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build
        run: go build ./...

      - name: Unit tests
        run: go test ./cmd/... ./internal/...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      # Conformance runs against a real YDB instance; gated behind the
      # `conformance` build tag and run on demand rather than on every push.
      - name: Conformance (compile check)
        run: go vet -tags=conformance ./tests/conformance/...
