name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Pure unit suite + lint. Needs no database, so it runs in parallel with the
  # integration job below. YDB-backed tests are build-tag gated and excluded here.
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build
        run: go build ./...

      - name: Unit tests
        run: go test ./cmd/... ./internal/...

      - name: Lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest

      # Conformance needs a real YDB and is run on demand; here we only ensure it
      # still compiles so it doesn't bitrot.
      - name: Conformance (compile check)
        run: go vet -tags=conformance ./tests/conformance/...

  # YDB-backed integration tests (state store + output binding) against a real YDB
  # brought up via the project's docker-compose. Runs in parallel with `unit`.
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Start YDB
        run: docker compose -f deploy/docker-compose.yml up -d ydb

      - name: Wait for YDB
        run: |
          for i in $(seq 1 60); do
            if (exec 3<>/dev/tcp/127.0.0.1/2136) 2>/dev/null; then
              echo "YDB grpc port reachable"; sleep 3; exit 0
            fi
            sleep 2
          done
          echo "YDB did not become ready in time"
          docker compose -f deploy/docker-compose.yml logs ydb
          exit 1

      - name: Integration tests
        run: go test -tags=integration -v ./internal/ydbstate/... ./tests/integration/...

      - name: Stop YDB
        if: always()
        run: docker compose -f deploy/docker-compose.yml down -v
